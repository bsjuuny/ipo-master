name: Deploy Competition Override

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'public/data/competition_override.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets
        run: |
          if [ -z "$NEXT_PUBLIC_ADMIN_KEY" ]; then
            echo "ERROR: NEXT_PUBLIC_ADMIN_KEY secret is not set"
            exit 1
          fi
        env:
          NEXT_PUBLIC_ADMIN_KEY: ${{ secrets.NEXT_PUBLIC_ADMIN_KEY }}

      - name: Apply competition override
        run: npm run override:apply

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /ipomaster
          NEXT_PUBLIC_ADMIN_KEY: ${{ secrets.NEXT_PUBLIC_ADMIN_KEY }}
          NEXT_PUBLIC_GITHUB_TOKEN: ${{ secrets.NEXT_PUBLIC_GITHUB_TOKEN }}

      - name: Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CAFE24_FTP_SERVER }}
          username: ${{ secrets.CAFE24_FTP_USERNAME }}
          password: ${{ secrets.CAFE24_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/ipomaster/
          dangerous-clean-slate: false
