name: Deploy on Push

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # [skip ci] 커밋 (데이터 업데이트)은 배포 생략
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply competition override
        run: npm run override:apply

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /ipomaster
          NEXT_PUBLIC_ADMIN_KEY: ${{ secrets.NEXT_PUBLIC_ADMIN_KEY }}
          NEXT_PUBLIC_GITHUB_TOKEN: ${{ secrets.NEXT_PUBLIC_GITHUB_TOKEN }}
          NEXT_PUBLIC_TOTP_SECRET: ${{ secrets.NEXT_PUBLIC_TOTP_SECRET }}

      - name: Deploy to Cafe24 via lftp mirror
        env:
          FTP_HOST: ${{ secrets.CAFE24_FTP_SERVER }}
          FTP_USER: ${{ secrets.CAFE24_FTP_USERNAME }}
          FTP_PASS: ${{ secrets.CAFE24_FTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "set ftp:list-options -a; \
          set ftp:passive-mode true; \
          set ftp:ssl-allow no; \
          set ftp:charset utf-8; \
          open -u \"$FTP_USER\",\"$FTP_PASS\" $FTP_HOST; \
          mkdir -p /www/ipomaster || true; \
          mirror -R ./out/ /www/ipomaster/ \
          --delete \
          --ignore-time \
          --parallel=2 \
          --exclude .git/ \
          --exclude .github/ \
          --verbose"
