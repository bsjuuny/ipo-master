name: Update Data & Deploy to Cafe24

on:
  schedule:
    - cron: '16 19 * * 0-4'  # 평일 오전 4:16 KST (UTC+9 → 전날 19:16 UTC)
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run scrapers
        run: npm run data:update
        env:
          NEXT_PUBLIC_FINUTS_EMAIL: ${{ secrets.FINUTS_EMAIL }}
          NEXT_PUBLIC_FINUTS_PASSWORD: ${{ secrets.FINUTS_PASSWORD }}

      - name: Commit data to git
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add public/data/ipo_list.json public/data/ipo_history.json
          
          git diff --staged --quiet
          if ($LASTEXITCODE -eq 0) {
              Write-Host "No data changes to commit."
              exit 0
          }
          
          git commit -m "data: update ipo intelligence [skip ci]"
          git push

      - name: Build
        run: npm run build

      - name: Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CAFE24_FTP_SERVER }}
          username: ${{ secrets.CAFE24_FTP_USERNAME }}
          password: ${{ secrets.CAFE24_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/ipomaster/
          dangerous-clean-slate: false

      - name: 📢 Notify Telegram on Success
        if: success()
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $msg = "✅ <b>IPO Master</b> 배포 성공!`n`nIPO 정보가 성공적으로 업데이트되었습니다.`n`n🔗 웹사이트: <a href=`"https://bsjuuny2026.mycafe24.com/ipomaster/`">바로가기</a>`n🔗 리포지토리: <a href=`"https://github.com/bsjuuny/ipo-master/actions`">확인하기</a>"
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg; parse_mode = "HTML" } | ConvertTo-Json
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $bytes -ContentType "application/json; charset=utf-8"

      - name: 🚨 Notify Telegram on Failure
        if: failure()
        shell: powershell
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $msg = "❌ <b>IPO Master</b> 배포 실패!`n`n데이터 업데이트 또는 빌드 과정에서 오류가 발생했습니다.`n🔗 리포지토리: <a href=`"https://github.com/bsjuuny/ipo-master/actions`">확인하기</a>"
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg; parse_mode = "HTML" } | ConvertTo-Json
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $bytes -ContentType "application/json; charset=utf-8"
