name: Update Data & Deploy to Cafe24

on:
  schedule:
    - cron: '16 19 * * 0-4'  # 평일 오전 4:16 KST (UTC+9 → 전날 19:16 UTC)
    - cron: '16 8 * * 1-5'   # 평일 오후 17:16 KST (08:16 UTC)
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write

    defaults:
      run:
        shell: powershell -ExecutionPolicy Bypass -NonInteractive -File "{0}"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Pull latest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run scrapers
        run: npm run data:update
        env:
          NEXT_PUBLIC_FINUTS_EMAIL: ${{ secrets.FINUTS_EMAIL }}
          NEXT_PUBLIC_FINUTS_PASSWORD: ${{ secrets.FINUTS_PASSWORD }}

      - name: Commit data to git
        run: |
          git add public/data/ipo_list.json public/data/ipo_history.json
          
          git diff --staged --quiet
          if ($LASTEXITCODE -eq 0) {
              Write-Host "No data changes to commit."
              exit 0
          }
          
          git commit -m "data: update ipo intelligence [skip ci]"
          git push

      - name: Build
        run: npm run build

      - name: Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CAFE24_FTP_SERVER }}
          username: ${{ secrets.CAFE24_FTP_USERNAME }}
          password: ${{ secrets.CAFE24_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/ipomaster/
          dangerous-clean-slate: false

      - name: 📋 Generate IPO Summary
        if: success()
        run: npm run generate:summary

      - name: 📢 Notify Telegram on Success
        if: success()
        run: |
          $msg = Get-Content -Path "ipo-summary.txt" -Raw -Encoding UTF8
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg; parse_mode = "HTML" } | ConvertTo-Json
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $bytes -ContentType "application/json; charset=utf-8"

      - name: 🚨 Notify Telegram on Failure
        if: failure()
        run: |
          $msg_b64 = "4p2MIDxiPklQTyBNYXN0ZXIg67Cw7Y+sIOyLpO2MqCE8L2I+CgrrjbDsnbTthLAg7JeF642w7J207Yq4IOuYkOuKlCDruYzrk5wg6rO87KCV7JeQ7IScIOyYpOulmOqwgCDrsJzsg53tlojsirXri4jri6QuCvCflJcg66as7Y+s7KeA7Yag66asOiA8YSBocmVmPSJodHRwczovL2dpdGh1Yi5jb20vYnNqdXVueS9pcG8tbWFzdGVyL2FjdGlvbnMiPu2ZleyduO2VmOq4sDwvYT4="
          $msg = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($msg_b64))
          $body = @{ chat_id = "${{ secrets.TELEGRAM_CHAT_ID }}"; text = $msg; parse_mode = "HTML" } | ConvertTo-Json
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($body)
          Invoke-RestMethod -Uri "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -Method POST -Body $bytes -ContentType "application/json; charset=utf-8"
