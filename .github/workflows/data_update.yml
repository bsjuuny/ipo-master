name: Update Data & Deploy to Cafe24

on:
  schedule:
    - cron: '16 19 * * 0-4'  # 평일 오전 4:16 KST (UTC+9 → 전날 19:16 UTC)
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run scrapers
        run: npm run data:update
        env:
          NEXT_PUBLIC_FINUTS_EMAIL: ${{ secrets.FINUTS_EMAIL }}
          NEXT_PUBLIC_FINUTS_PASSWORD: ${{ secrets.FINUTS_PASSWORD }}

      - name: Commit data to git
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add public/data/ipo_list.json public/data/ipo_history.json
          
          git diff --staged --quiet
          if ($LASTEXITCODE -eq 0) {
              Write-Host "No data changes to commit."
              exit 0
          }
          
          git commit -m "data: update ipo intelligence [skip ci]"
          git push

      - name: Build
        run: npm run build

      - name: Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CAFE24_FTP_SERVER }}
          username: ${{ secrets.CAFE24_FTP_USERNAME }}
          password: ${{ secrets.CAFE24_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/ipomaster/
          dangerous-clean-slate: false

      - name: 📢 Notify Telegram on Success
        if: success()
        run: node scripts/notify-telegram.js success
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: 🚨 Notify Telegram on Failure
        if: failure()
        run: node scripts/notify-telegram.js failure
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
